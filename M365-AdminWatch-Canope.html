function classifyText(text) {
  const t = (text || "").toLowerCase();
  for (const r of CAT_RULES) {
    for (const w of r.words) {
      if (t.includes(w)) return r;
    }
  }
  return null;
}

// ═══════════════════════════════════════════════
// PRIORITÉ
// ═══════════════════════════════════════════════
const P_URG  = ["critical security","zero-day","ransomware","cyberattaque","faille critique","cve-","exploit","breach","compromis","piratage","malware","phishing","hameçonnage"];
const P_CRIT = ["end of life","end of support","retirement","action required","breaking change","fin de support","migration obligatoire","patch tuesday","will retire","will be retired","deadline","déprécié"];
const P_IMP  = ["generally available","public preview","new feature","rolling out","introducing","announcing","update","nouvelle fonctionnalité","disponible","annonce","nouveauté","roadmap","in development"];

function getPrio(t) {
  const s = (t || "").toLowerCase();
  if (P_URG.some(k=>s.includes(k))) return "urgent";
  if (P_CRIT.some(k=>s.includes(k))) return "critical";
  if (P_IMP.some(k=>s.includes(k))) return "important";
  return "info";
}

function isAction(t) {
  return ["action required","deadline","fin de support","migration obligatoire","mandatory","you must","retire before"].some(k=>(t || "").toLowerCase().includes(k));
}

const PLBL = {urgent:"🔴 URGENT", critical:"🟠 CRITIQUE", important:"🟡 IMPORTANT", info:"🔵 INFO"};
const PCLR = {urgent:"#ff4757", critical:"#ff7f3f", important:"#ffc107", info:"#4a9eff"};
const PORD = {urgent:0, critical:1, important:2, info:3};

function fmtDate(s) {
  try {
    const d = new Date(s), n = new Date(), df = Math.floor((n-d)/1000);
    if (isNaN(d.getTime())) return "";
    if (df < 3600) return "Il y a " + Math.max(1, Math.floor(df/60)) + " min";
    if (df < 86400) return "Il y a " + Math.floor(df/3600) + " h";
    if (df < 172800) return "Hier";
    if (df < 604800) return "Il y a " + Math.floor(df/86400) + " j";
    return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
  } catch(e){ return ""; }
}

// ═══════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════
const CACHE_KEY = 'adminwatch_cache_v3';
const CACHE_TTL = 30 * 60 * 1000;

const PROXIES = [
  { name:"allorigins", fn:u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, json:true  },
  { name:"corsproxy",  fn:u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,               json:false },
  { name:"codetabs",   fn:u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, json:false },
  { name:"thingproxy", fn:u=>`https://thingproxy.freeboard.io/fetch/${encodeURIComponent(u)}`,    json:false },
];

function cacheGet(url) {
  try {
    const c = JSON.parse(sessionStorage.getItem(CACHE_KEY) || '{}');
    const e = c[url];
    if (e && Date.now() - e.ts < CACHE_TTL) return e.data;
  } catch(e){}
  return null;
}

function cacheSet(url, data) {
  try {
    const c = JSON.parse(sessionStorage.getItem(CACHE_KEY) || '{}');
    c[url] = { ts:Date.now(), data };
    const keys = Object.keys(c);
    if (keys.length > 50) delete c[keys[0]];
    sessionStorage.setItem(CACHE_KEY, JSON.stringify(c));
  } catch(e){}
}

function timedFetch(url, ms) {
  return new Promise((ok, ko) => {
    const t = setTimeout(() => ko(new Error("timeout")), ms);
    fetch(url)
      .then(r => { clearTimeout(t); ok(r); })
      .catch(e => { clearTimeout(t); ko(e); });
  });
}

async function fetchViaProxy(rawUrl) {
  let lastError = null;

  for (const px of PROXIES) {
    try {
      const r = await timedFetch(px.fn(rawUrl), 9000);
      if (!r.ok) continue;

      let txt = "";
      if (px.json) {
        const j = await r.json();
        txt = (j.contents || j.contentsHtml || j.data || "");
      } else {
        txt = await r.text();
      }

      if (txt && txt.trim()) {
        return txt;
      }
    } catch (e) {
      lastError = e;
    }
  }

  throw lastError || new Error("fetch impossible");
}

async function fetchRSS(url) {
  const cached = cacheGet(url);
  if (cached) return cached;

  let txt = "";

  try {
    txt = await fetchViaProxy(url);

    if (txt && (txt.includes("<item") || txt.includes("<entry") || txt.includes("<rss") || txt.includes("<feed"))) {
      cacheSet(url, txt);
      return txt;
    }
  } catch(e) {}

  // Fallback spécifique Message Center :
  // si le RSS ne passe pas, on récupère la page archive HTML.
  if (url.includes("mc.merill.net")) {
    const html = await fetchViaProxy("https://mc.merill.net/");
    if (html && html.includes("Microsoft 365 Message Center Archive")) {
      cacheSet(url, html);
      return html;
    }
  }

  throw new Error("RSS/HTML indisponible : " + url);
}

// ═══════════════════════════════════════════════
// PARSE RSS + FALLBACK MESSAGE CENTER HTML
// ═══════════════════════════════════════════════
function parseMessageCenterHTML(html, src) {
  const doc = new DOMParser().parseFromString(html, "text/html");

  const anchors = Array.from(doc.querySelectorAll('a[href*="/message/MC"], a[href*="mc.merill.net/message/MC"]'));
  const uniq = new Set();
  const out = [];

  for (const a of anchors) {
    const hrefRaw = a.getAttribute("href") || "";
    const href = hrefRaw.startsWith("http") ? hrefRaw : new URL(hrefRaw, "https://mc.merill.net/").href;
    const mc = href.match(/MC\d+/i);
    if (!mc) continue;

    const key = mc[0].toUpperCase();
    if (uniq.has(key)) continue;
    uniq.add(key);

    let container =
      a.closest("tr") ||
      a.closest("article") ||
      a.closest("li") ||
      a.parentElement;

    const blockText = (container?.textContent || "").replace(/\s+/g, " ").trim();
    const title = (a.textContent || "").replace(/\s+/g, " ").trim() || key;

    const dateMatch = blockText.match(/\b(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},\s+\d{4}\b/i);
    const rawDate = dateMatch ? dateMatch[0] : "";

    const fullText = title + " " + blockText;
    const found = classifyText(fullText);

    const cat = found ? found.cat : src.cat;
    const color = found ? found.color : src.color;
    const emo = found ? found.emo : src.emo;

    out.push({
      origCat: src.cat,
      cat,
      group: src.group,
      color,
      emo,
      source: src.lbl,
      title,
      summary: blockText.substring(0, 220) + (blockText.length > 220 ? "…" : ""),
      date: fmtDate(rawDate),
      rawDate,
      priority: getPrio(fullText),
      actionRequired: isAction(fullText),
      link: href
    });
  }

  return out;
}

function parseRSS(xml, src) {
  const isLikelyHTML = /<html[\s>]/i.test(xml) || /<body[\s>]/i.test(xml);

  if (src.cat === "Message Center" && isLikelyHTML) {
    const htmlItems = parseMessageCenterHTML(xml, src);
    if (htmlItems.length) return htmlItems;
  }

  const doc = new DOMParser().parseFromString(xml, "text/xml");
  const parseErr = doc.querySelector("parsererror");
  const items = Array.from(doc.querySelectorAll("item, entry"));

  if ((!items.length || parseErr) && src.cat === "Message Center") {
    const htmlItems = parseMessageCenterHTML(xml, src);
    if (htmlItems.length) return htmlItems;
  }

  if (!items.length) throw new Error("vide");

  return items.map((item) => {
    const get = (tag) => {
      const el = item.querySelector(tag);
      if (!el) return "";
      if (tag === "link" && !el.textContent.trim()) return el.getAttribute("href") || "";
      return (el.textContent || "").trim();
    };

    const title   = get("title");
    const link    = get("link");
    const rawDesc = get("description") || get("summary") || get("content");
    const desc    = rawDesc
      .replace(/<[^>]+>/g," ")
      .replace(/\s+/g," ")
      .replace(/&amp;/g,"&")
      .replace(/&lt;/g,"<")
      .replace(/&gt;/g,">")
      .replace(/&#\d+;/g,"")
      .trim();

    const rawDate = get("pubDate") || get("published") || get("updated");
    const cats    = Array.from(item.querySelectorAll("category")).map(c=>c.textContent).join(" ");
    const fullText = title + " " + desc + " " + cats;

    let cat = src.cat, color = src.color, emo = src.emo, origCat = src.cat;

    if (src.group === "admin" || src.group === "fr" || src.group === "tech") {
      const found = classifyText(fullText);
      if (found) {
        cat = found.cat;
        color = found.color;
        emo = found.emo;
      }
    }

    return {
      origCat,
      cat,
      group:src.group,
      color,
      emo,
      source:src.lbl,
      title,
      summary: desc.substring(0,220)+(desc.length>220?"…":""),
      date: fmtDate(rawDate),
      rawDate,
      priority: getPrio(fullText),
      actionRequired: isAction(fullText),
      link: link || "#"
    };
  });
}

async function startScan() {
  const btn = document.getElementById("btnScan");
  btn.disabled = true;
  btn.classList.add("spinning");
  btn.innerHTML = '<span class="spin">⟳</span> Chargement…';

  allNews = [];
  document.getElementById("errBar").className = "err-bar";
  setProg(4);

  const ss = SOURCES.map(s=>({lbl:s.lbl,st:"pending"}));
  drawSteps(ss);

  const cardsEl = document.getElementById("cards");
  cardsEl.innerHTML = Array(8).fill('<div class="skel-card"><div class="skel" style="height:9px;width:35%;margin-bottom:9px"></div><div class="skel" style="height:13px;width:70%;margin-bottom:8px"></div><div class="skel" style="height:9px;width:100%;margin-bottom:3px"></div><div class="skel" style="height:9px;width:55%"></div></div>').join("");

  let done = 0, errors = 0;

  async function loadOne(src,i) {
    ss[i].st = "active";
    drawSteps(ss);

    try {
      const xml = await fetchRSS(src.url);
      const items = parseRSS(xml,src);
      allNews.push(...items);
      ss[i].st = "done";
    } catch(e) {
      console.warn("Flux KO:", src.lbl, e);
      ss[i].st = "err";
      errors++;
    }

    done++;
    setProg(4 + Math.floor(done/SOURCES.length*90));
    drawSteps(ss);

    if(allNews.length>0){
      dedup();
      updateCounts();
      drawSvcCards();
      renderHealthView();
      if (viewMode === "presse") render();
    }
  }

  await Promise.allSettled(SOURCES.map((s,i)=>loadOne(s,i)));

  dedup();
  updateCounts();
  drawSvcCards();
  renderHealthView();
  render();

  setProg(100);
  setTimeout(()=>{hideProg();hideSteps();},2000);

  if(errors===SOURCES.length){
    showErr(`<strong>⚠️ Tous les flux sont inaccessibles.</strong> Votre réseau bloque peut-être les requêtes externes. Réessayez dans quelques instants.`);
  } else if(errors>0){
    showErr(`ℹ️ <strong>${errors} flux indisponibles sur ${SOURCES.length}</strong> — ${SOURCES.length-errors} sources chargées.`);
  }

  const lo = document.getElementById("lastOk");
  lo.style.display = "inline";
  lo.textContent = "✓ " + new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});

  btn.disabled = false;
  btn.classList.remove("spinning");
  btn.innerHTML = '<span class="spin">⟳</span> Actualiser';

  if(viewMode==="sante") renderHealthView();
}

function dedup() {
  const seen = new Set();
  allNews = allNews.filter(n => {
    const key = (n.title || "").trim().toLowerCase() + "|" + (n.link || "");
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  allNews.sort((a,b)=>new Date(b.rawDate||0)-new Date(a.rawDate||0));
}

// ═══════════════════════════════════════════════
function render() {
  let data = [...allNews];

  if (fPrio !== "all") data = data.filter(n => n.priority === fPrio);

  if (fCat === "ms") data = data.filter(n => n.group==="ms" || n.group==="admin");
  else if (fCat === "fr") data = data.filter(n => n.group==="fr");
  else if (fCat === "tech") data = data.filter(n => n.group==="tech");
  else if (fCat !== "all") data = data.filter(n => n.cat===fCat || n.origCat===fCat || n.source===fCat);

  const q = document.getElementById("search").value.toLowerCase();
  if (q) data = data.filter(n => (n.title+n.summary+n.source).toLowerCase().includes(q));

  const s = document.getElementById("sort").value;
  if (s === "prio") data.sort((a,b)=>PORD[a.priority]-PORD[b.priority]);
  else if (s === "src") data.sort((a,b)=>(a.source||"").localeCompare(b.source||""));
  else data.sort((a,b)=>new Date(b.rawDate||0)-new Date(a.rawDate||0));

  const el = document.getElementById("cards");
  if (!data.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><p>Aucun résultat.</p></div>';
    return;
  }

  el.innerHTML = "";
  const frag = document.createDocumentFragment();

  data.forEach((n,i)=>{
    const pc = PCLR[n.priority] || "#4a9eff";

    const card = document.createElement("div");
    card.className = "card";

    const stripe = document.createElement("div");
    stripe.className = "card-stripe";
    stripe.style.background = pc;
    card.appendChild(stripe);

    const head = document.createElement("div");
    head.className = "card-head";

    const bads = document.createElement("div");
    bads.className = "badges";

    mkBadge(bads, n.emo+" "+n.cat, n.color);
    mkBadge(bads, PLBL[n.priority], pc);

    if (n.group==="admin") mkBadge(bads,"📬 ADMIN","#ff6b35");
    else if (n.group==="ms") mkBadge(bads,"🏢 MS","#4a9eff");
    else if (n.group==="fr") mkBadge(bads,"🇫🇷 FR","#22c55e");
    else if (n.group==="tech") mkBadge(bads,"🌍 EN","#ff8c00");

    if (n.source === "Ars Technica") mkBadge(bads,"🧠 Ars Technica","#ff8c00",true);
    if (n.origCat !== n.cat) mkBadge(bads,"via "+n.origCat,"#7a86a8",true);
    if (i < 4) mkBadge(bads,"NOUVEAU","#22c55e");
    if (n.actionRequired) mkBadge(bads,"⚡ ACTION","#ff4757");

    head.appendChild(bads);

    const dt = document.createElement("span");
    dt.className = "card-date";
    dt.textContent = n.date || "";
    head.appendChild(dt);

    card.appendChild(head);

    tit.className = "card-title";

    card.appendChild(tit);

    const bod = document.createElement("div");
    bod.className = "card-body";
    bod.textContent = n.summary;
    card.appendChild(bod);

    const foot = document.createElement("div");
    foot.className = "card-foot";

    const src = document.createElement("span");
    src.className = "card-src";
    src.textContent = "🔗 " + n.source;

    lnk.href = n.link;

    lnk.textContent = "↗ Lire";
    foot.appendChild(lnk);

    card.appendChild(foot);
    frag.appendChild(card);
  });

  el.appendChild(frag);
}

function mkBadge(parent, text, color, small=false) {
  const b = document.createElement("span");
  b.className = "b";
  b.textContent = text;
  b.style.color = color;
  b.style.border = "1px solid " + color + "55";
  b.style.background = color + "15";
  if (small) b.style.fontSize = "8px";
  parent.appendChild(b);
}

function matchSvc(n, svc) {
  if (svc.cats && svc.cats.includes(n.cat)) return true;
  if (svc.cats && svc.cats.includes(n.origCat)) return true;
  const t = (n.title+" "+n.summary).toLowerCase();
  return svc.kw.some(k => t.includes(k));
}

function getSvcIncidents(svc){
  return allNews.filter(n=>{
    if(n.priority!=="urgent" && n.priority!=="critical") return false;
    return matchSvc(n, svc);
  });
}

function getSvcRelated(svc){
  return allNews.filter(n=>matchSvc(n, svc));
}

      bp.style.border = "1px solid "+pc+"44";
      bp.style.background = pc+"15";
      brow.appendChild(bp);

      const bs = document.createElement("span");
      bs.className = "b";
      bs.textContent = n.source;
      bs.style.color = "var(--mu2)";
      bs.style.border = "1px solid var(--b1)";
      bs.style.background = "var(--s3)";
      brow.appendChild(bs);

      left.appendChild(brow);

      const tit = document.createElement("div");
      tit.style.cssText="font-size:12px;color:var(--tx);line-height:1.4;font-weight:600";
      tit.textContent = n.title.length>90 ? n.title.substring(0,90)+"…" : n.title;
      left.appendChild(tit);

      const a = document.createElement("a");
      a.className = "read-btn";
      a.style.cssText="white-space:nowrap;align-self:center;flex-shrink:0";
      a.href = n.link;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "↗";
      a.title = "Lire l'article";

      row.appendChild(left);
      row.appendChild(a);
      rssEl.appendChild(row);
    });

    if (otherRelated.length>6) {
      const more = document.createElement("div");
      more.style.cssText="font-size:10px;color:var(--mu);text-align:center;padding:5px;font-family:'IBM Plex Mono',monospace";
      more.textContent = "+ " + (otherRelated.length-6) + " autres articles";
      rssEl.appendChild(more);
    }
  } else {
    rssSec.style.display = "none";
  }

  document.getElementById("mup").textContent = svc.uptime+"%";
  document.getElementById("mup").style.color = svc.uptime>=99.9 ? "#22c55e" : "#ffc107";

  const bar = document.getElementById("mupbar");
  bar.style.background = svc.uptime>=99.9 ? "#22c55e" : "#ffc107";
  bar.style.width = "0%";
  setTimeout(()=>bar.style.width = svc.uptime+"%",80);

  const ml = document.getElementById("mlinks");
  ml.innerHTML = "";

  [
    {href:svc.admin, lbl:"🛡 Centre d'administration"},
    {href:"https://status.cloud.microsoft/m365/", lbl:"📊 status.cloud.microsoft"},
    {href:svc.docs, lbl:"📚 Documentation Microsoft"},
    {href:"https://admin.microsoft.com/Adminportal/Home#/servicehealth", lbl:"❤️ Service Health Dashboard"},
  ].forEach(l=>{
    const a = document.createElement("a");
    a.className = "modal-link";
    a.href = l.href;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = l.lbl;
    ml.appendChild(a);
  });

  document.getElementById("modalBg").classList.add("on");
}

  document.getElementById("modalBg").classList.remove("on");

function getActionGuide(item) {
  const t = (item.title+" "+item.summary).toLowerCase();
  for (const g of ACTION_GUIDES) {
    if (g.match[0]==="__fallback__") continue;
    if (g.match.some(k=>t.includes(k))) return g;
  }
  return ACTION_GUIDES[ACTION_GUIDES.length-1];
}

function extractDeadline(text) {
  const patterns = [
    /(\w+ \d{1,2},?\s*\d{4})/gi,
    /(\d{1,2}\s+\w+\s+\d{4})/gi,
    /(\w+\s+\d{4})/gi,
    /(q[1-4]\s*\d{4})/gi,
    /(\d{1,2}\/\d{1,2}\/\d{4})/gi,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[0]) return m[0];
  }
  return null;
}

function drawActionsList() {

  const actions = allNews.filter(n=>n.actionRequired);

  if (!actions.length) {
    el.innerHTML = '<div class="empty-actions">✅ Aucune action requise détectée dans les flux actuels.</div>';
    return;
  }

  actions.sort((a,b)=>(PORD[a.priority]||3)-(PORD[b.priority]||3));

  actions.forEach(item=>{
    const guide = getActionGuide(item);
    const deadline = extractDeadline(item.title+" "+item.summary);
    const pc = PCLR[item.priority] || "#ffc107";

    const card = document.createElement("div");
    card.className = "action-card "+(item.priority==="urgent"?"urgent":item.priority==="critical"?"critical":"");

    const head = document.createElement("div");
    head.className = "action-head";

    const tit = document.createElement("div");
    tit.className = "action-title";
    tit.textContent = item.title;
    head.appendChild(tit);
    card.appendChild(head);

    const bads = document.createElement("div");
    bads.className = "action-badges";

    const bp = document.createElement("span");
    bp.className = "b";
    bp.textContent = PLBL[item.priority];
    bp.style.color = pc;
    bp.style.border = "1px solid "+pc+"55";
    bp.style.background = pc+"15";
    bads.appendChild(bp);

    const bc = document.createElement("span");
    bc.className = "b";
    bc.textContent = item.emo+" "+item.cat;
    bc.style.color = item.color;
    bc.style.border = "1px solid "+item.color+"44";

    const bs = document.createElement("span");

    bs.textContent = "🔗 " + item.source;
    bs.style.color = "var(--mu2)";
    bs.style.border = "1px solid var(--b1)";
    bs.style.background = "var(--s2)";
    bads.appendChild(bs);

    if (deadline) {
      const bd = document.createElement("span");
      bd.className = "deadline-pill";
      bd.textContent = "📅 " + deadline;
      bads.appendChild(bd);
    }

    card.appendChild(bads);

    const lvlBlock = document.createElement("div");
    lvlBlock.className = "action-block";
    lvlBlock.innerHTML = `<div class="action-block-title">Niveau d'action</div><div class="action-block-body"><strong style="color:#835b00">${guide.level}</strong></div>`;
    card.appendChild(lvlBlock);

    if (item.summary) {
      const sumBlock = document.createElement("div");
      sumBlock.className = "action-block";
      sumBlock.innerHTML = `<div class="action-block-title">Contexte</div><div class="action-block-body">${item.summary}</div>`;
